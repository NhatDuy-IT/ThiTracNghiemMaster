<!-- Alert Modal (thay thế alert()) -->
<div id="alertModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full transform transition-all scale-95 opacity-0" id="alertModalContent">
        <!-- Icon -->
        <div class="flex justify-center pt-8 pb-4" id="alertIcon">
            <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>
        
        <!-- Content -->
        <div class="px-8 pb-6 text-center">
            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2" id="alertTitle">Thông báo</h3>
            <p class="text-slate-600 dark:text-slate-400" id="alertMessage">Nội dung thông báo</p>
        </div>
        
        <!-- Button -->
        <div class="px-8 pb-8">
            <button type="button" onclick="closeAlert()" class="w-full px-6 py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary/90 transition-colors shadow-lg shadow-primary/30">
                Đóng
            </button>
        </div>
    </div>
</div>

<!-- Confirm Modal (thay thế confirm()) -->
<div id="confirmModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full transform transition-all scale-95 opacity-0" id="confirmModalContent">
        <!-- Icon -->
        <div class="flex justify-center pt-8 pb-4">
            <div class="w-16 h-16 bg-yellow-500/10 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>
        
        <!-- Content -->
        <div class="px-8 pb-6 text-center">
            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Xác nhận</h3>
            <p class="text-slate-600 dark:text-slate-400" id="confirmMessage">Bạn có chắc chắn muốn thực hiện hành động này?</p>
        </div>
        
        <!-- Buttons -->
        <div class="flex gap-3 px-8 pb-8">
            <button type="button" onclick="closeConfirm()" class="flex-1 px-6 py-3 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                Hủy
            </button>
            <button type="button" onclick="confirmYes()" class="flex-1 px-6 py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary/90 transition-colors shadow-lg shadow-primary/30">
                Xác nhận
            </button>
        </div>
    </div>
</div>
